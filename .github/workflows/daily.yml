name: Daily diary pipeline

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Entry date YYYY-MM-DD; defaults to runner date"
        required: false
        type: string
  schedule:
    # 23:30 UTC = 04:30 Asia/Karachi next day; adjust after testing.
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run daily pipeline
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-4o-mini' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.1' }}
        run: |
          DATE_INPUT="${{ inputs.date }}"
          if [ -n "$DATE_INPUT" ]; then
            python scripts/run_daily.py --date "$DATE_INPUT" --force
          else
            python scripts/run_daily.py --force
          fi
      
      - name: Rebuild frontend assets
        run: |
          python3 scripts/build_frontend.py
          echo "✅ Frontend rebuilt"
      
      - name: Commit generated entry
        run: |
          git config user.name "the-witness-bot"
          git config user.email "the-witness-bot@users.noreply.github.com"
          
          # Check if there are any changes (diary, sources, or public)
          if ! git diff --quiet HEAD -- diary sources public; then
            git add diary sources public
            git commit -m "Add daily diary entry"
            git push
            echo "✅ Changes pushed to GitHub"
          else
            echo "ℹ️  No changes to commit"
          fi
