name: Deploy to GitHub Pages

on:
  # Run on push to main branch
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'styles.css'
      - 'app.js'
      - 'public/**'
      - 'diary/**'
      - '.github/workflows/deploy-pages.yml'
  
  # Allow manual trigger
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site artifact (publish site only)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          # Static site files
          cp -a index.html styles.css app.js robots.txt .nojekyll dist/
          cp -a assets dist/assets
          cp -a public dist/public

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
