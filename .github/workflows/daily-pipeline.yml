name: The Witness - Daily Pipeline

# Force Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Run daily at 23:00 PKT (18:00 UTC)
  schedule:
    - cron: '0 18 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD format, defaults to today)'
        required: false
        type: string
      skip_validation:
        description: 'Skip validation step'
        required: false
        type: boolean
        default: false

  # Run on push (for testing)
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/**'
      - 'prompts/**'
      - 'sources/**'

jobs:
  generate-entry:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "No requirements.txt found, skipping"
    
    - name: Determine date
      id: date
      run: |
        if [ -n "${{ github.event.inputs.date }}" ]; then
          echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
        else
          # Use Pakistan time (Asia/Karachi) for consistency with project
          echo "date=$(TZ='Asia/Karachi' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        fi
    
    - name: Run daily pipeline
      env:
        AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'gemini' }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5.1' }}
      run: |
        python scripts/run_daily.py --date ${{ steps.date.outputs.date }} --force
    
    - name: Validate generated entry
      if: ${{ !github.event.inputs.skip_validation && 'true' || 'false' }}
      run: |
        YEAR=$(echo ${{ steps.date.outputs.date }} | cut -d'-' -f1)
        MONTH=$(echo ${{ steps.date.outputs.date }} | cut -d'-' -f2)
        ENTRY_PATH="diary/${YEAR}/${MONTH}/${{ steps.date.outputs.date }}.md"
        python scripts/entry_review.py "${ENTRY_PATH}"
        echo "Validation passed!"
      continue-on-error: true
    
    - name: Validate with strict mode (only fail on errors)
      if: ${{ !github.event.inputs.skip_validation && 'true' || 'false' }}
      run: |
        YEAR=$(echo ${{ steps.date.outputs.date }} | cut -d'-' -f1)
        MONTH=$(echo ${{ steps.date.outputs.date }} | cut -d'-' -f2)
        ENTRY_PATH="diary/${YEAR}/${MONTH}/${{ steps.date.outputs.date }}.md"
        # Only fail on errors (not warnings)
        python scripts/entry_review.py "${ENTRY_PATH}" --json > validation-report.json
        # Check if there are any errors in the JSON
        if grep -q '"severity": "error"' validation-report.json; then
          echo "❌ Validation errors found!"
          cat validation-report.json
          exit 1
        else
          echo "✅ No validation errors (warnings only)"
        fi
      continue-on-error: false
    
    - name: Generate validation report (JSON)
      if: always()
      run: |
        YEAR=$(echo ${{ steps.date.outputs.date }} | cut -d'-' -f1)
        MONTH=$(echo ${{ steps.date.outputs.date }} | cut -d'-' -f2)
        ENTRY_PATH="diary/${YEAR}/${MONTH}/${{ steps.date.outputs.date }}.md"
        python scripts/entry_review.py "${ENTRY_PATH}" --json > validation-report.json || true
        cat validation-report.json
    
    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add diary/ sources/ public/
        git diff --staged --quiet || git commit -m "Auto-generate entry for ${{ steps.date.outputs.date }}"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload validation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-report-${{ steps.date.outputs.date }}
        path: validation-report.json
        retention-days: 30
    
    - name: Notify on failure
      if: failure()
      run: |
        echo "::error::Daily pipeline failed for ${{ steps.date.outputs.date }}"
        # Add notification logic here (Slack, email, etc.)

  validate-all-entries:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "No requirements.txt found, skipping"
    
    - name: Validate all entries (batch)
      run: |
        python scripts/entry_review.py diary/ --batch --json > all-entries-report.json
        cat all-entries-report.json
    
    - name: Upload batch validation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: all-entries-validation-report
        path: all-entries-report.json
        retention-days: 90
